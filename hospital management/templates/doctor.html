{% extends 'base.html' %}
{% block content %}

<h1 class="page-title">Doctors</h1>

<!-- Add Doctor Form -->
<div class="form-card">
<form method="POST">
    <h5 class="mb-3">Add New Doctor</h5>
    <div class="row g-3">
        <div class="col-md-2">
            <input name="doctor_id" class="form-control" placeholder="ID" required>
        </div>
        <div class="col-md-3">
            <input name="name" class="form-control" placeholder="Name" required>
        </div>
        <div class="col-md-3">
            <input name="specialization" class="form-control" placeholder="Specialization">
        </div>
        <div class="col-md-2">
            <input name="phone" class="form-control" placeholder="Phone">
        </div>
        <div class="col-md-2">
            <button class="btn btn-primary w-100">Save</button>
        </div>
    </div>
</form>
</div>

<!-- Doctor Table -->
<div class="table-card">
<table class="table table-hover">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Specialization</th>
            <th>Phone</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
    {% for d in doctors %}
        <tr>
            <td>{{ d.doctor_id }}</td>
            <td>{{ d.Name }}</td>
            <td>{{ d.specialization }}</td>
            <td>{{ d.phone }}</td>
            <td>
                <a href="/delete_doctor/{{ d.doctor_id }}"
                   class="btn btn-sm btn-outline-danger"
                   onclick="return confirm('Delete this doctor?')">
                   Delete
                </a>
            </td>
        </tr>
    {% endfor %}
    </tbody>
</table>
</div>

{% endblock %}
